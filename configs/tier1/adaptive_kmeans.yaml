# Tier-1 #1 — adaptive top-k (AVIR k-means, k=2, Top-8 cap).
# Same retriever as the fixed-k baseline; only the CUT changes (fixed top_k ->
# per-query cluster on the score distribution). Compare against subA bm25 at a
# tuned fixed k: fixed-k vs adaptive-k, retriever held constant.
name: tier1-bm25-adaptive-kmeans
seed: 0
data: {name: mmlongbench-doc, slice: full}
representation: {parser: pymupdf4llm, chunking: page, dpi: 144}
retrieval:
  method: bm25
  top_k: 4              # fallback cut on degenerate (tiny/flat) score arrays
  k_strategy: kmeans
  candidate_k: 16       # pool the cut chooses from (0 -> auto = max(top_k*4, 8))
generation:
  modality: image
  generator: kaya_vlm
  model_id: Qwen/Qwen2.5-VL-7B-Instruct
judge: {type: rule}
