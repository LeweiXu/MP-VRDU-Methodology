# Tier-1 #3 — retrieve -> rerank -> read (SimpleDoc/CREAM coarse-to-fine).
# bm25 shortlists rerank_candidates pages; a frozen LLM re-scores them over page
# text; the cut keeps top_k. Clean factor: retriever-alone vs retriever+rerank.
# GPU note: the reranker holds a model during Phase 1 alongside the retriever —
# on the 12GB box reuse the slot / run as a small Phase-1.5 (see rerank.py).
name: tier1-bm25-rerank-llm
seed: 0
data: {name: mmlongbench-doc, slice: full}
representation: {parser: pymupdf4llm, chunking: page, dpi: 144}
retrieval:
  method: bm25
  top_k: 3                 # SimpleDoc: reranking down to ~3 pages recovers F1
  rerank: llm
  rerank_candidates: 12    # retrieve 12, rerank, keep top_k
  rerank_model: Qwen/Qwen2.5-7B-Instruct
generation:
  modality: image
  generator: kaya_vlm
  model_id: Qwen/Qwen2.5-VL-7B-Instruct
judge: {type: rule}
