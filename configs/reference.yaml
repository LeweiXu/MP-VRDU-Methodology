# THE REFERENCE PIPELINE — the named control every RQ perturbs.
#
# docs/research_questions.md §1 defines ONE fixed skeleton; each study changes
# exactly one mechanism and holds everything else pinned at these values, which
# are then declared in methods. Do not edit casually: changing a pin re-baselines
# every RQ comparison.
#
#   Generator          : Qwen2.5-VL-7B-Instruct (frozen)        [pinned]
#   Representation     : PyMuPDF4LLM native-text parse, page    [pinned default]
#   Retrieval          : DENSE TEXT retriever (pinned embedder) [pinned default]
#   Reasoning / prompt : plain single-pass chain-of-thought     [pinned default]
#   Generation modality: text (declared)                        [pinned default]
#   Judge              : fixed LLM judge (faithful scoring)      [pinned]
#
# Why dense text as the default retriever (not BM25 or visual): it is modality-
# neutral (operates on parser text, so RQ2 has a clean background), a fair
# midpoint of the sparse<->dense<->visual axis, and a reasonable — not strawman —
# baseline. See research_questions.md §1.
#
# Per-RQ control caveat: when the mechanism under test IS retrieval (RQ1), the
# control is the no-retrieval floor + oracle ceiling, NOT this dense retriever.
#
# LOCAL OVERRIDE (12GB dev box): this declares the real control. To run it
# locally, flip the generator to the 3B stand-in and the judge to the rule judge:
#   generation.generator -> local_small_vlm ; model_id -> Qwen2.5-VL-3B-Instruct
#   judge.type -> rule
# (or pass --generator/--model-id on the CLI). NEVER report 3B/rule-judge numbers.
name: reference
seed: 0

data:
  name: mmlongbench-doc
  slice: full

representation:
  parser: pymupdf4llm        # pinned default parser (native-text)
  chunking: page
  dpi: 144

retrieval:
  method: dense              # pinned default retriever (modality-neutral midpoint)
  embedding_model: sentence-transformers/all-MiniLM-L6-v2   # PINNED, declared
  top_k: 4

generation:
  modality: text             # pinned default modality (declared)
  generator: kaya_vlm        # <-- LOCAL OVERRIDE: local_small_vlm + 3B
  model_id: Qwen/Qwen2.5-VL-7B-Instruct
  reasoning: cot             # plain single-pass chain-of-thought (the control)
  max_new_tokens: 256
  temperature: 0.0

judge:
  type: llm                  # faithful MMLongBench-Doc scoring; fixed + declared
  model_id: Qwen/Qwen2.5-7B-Instruct
