# Example: oracle ceiling scored with the LLM judge (faithful MMLongBench-Doc
# scoring) instead of the rule judge. The judge model is fixed + declared and
# loaded offline from the HF cache (stage it on Kaya like any other model).
# Use this shape on the KEY conditions to get reportable, comparable numbers.
name: oracle-7b-image-llmjudge
seed: 0
data: {name: mmlongbench-doc, slice: full}
representation: {parser: pymupdf4llm, chunking: page, dpi: 144}
retrieval: {method: oracle, top_k: 8}
generation:
  modality: image
  generator: kaya_vlm
  model_id: Qwen/Qwen2.5-VL-7B-Instruct
judge:
  type: llm
  model_id: Qwen/Qwen2.5-7B-Instruct      # FIXED across all conditions; declare it
