# Full experiment grid, RQ-framed (docs/research_questions.md is the GOVERNING
# spec), configured for LOCAL testing with the tiny 3B VLM.
#
# The study analyses MECHANISMS, not products: each study below traces to a
# research question (RQ1 retrieval · RQ2 representation · RQ3 reasoning · RQ4
# coarse-to-fine) with directional, per-subset hypotheses measured against a
# declared control. Named tools (BM25/ColPali/MinerU/...) are just instantiations.
#
# ╔══════════════════════════════════════════════════════════════════════════╗
# ║ THE KAYA SWITCH: to run this exact grid on Kaya with the real 7B/32B,      ║
# ║ change ONLY the `defaults.generation` block below:                         ║
# ║     generator: kaya_vlm                                                     ║
# ║     model_id:  Qwen/Qwen2.5-VL-7B-Instruct   # or -32B                      ║
# ╚══════════════════════════════════════════════════════════════════════════╝
#
# Each study spec has METADATA (rq / subset / control / hypotheses — consumed by
# the reporter, ignored by the runner) plus `axes` (cross-producted into runs).
# Run:   python scripts/run_grid.py --suite experiments/grid_local_3b.yaml
# Report (with verdicts): python scripts/report.py --results results/grid \
#                                --suite experiments/grid_local_3b.yaml

defaults:
  seed: 0
  data: {name: mmlongbench-doc, slice: full}
  representation: {parser: pymupdf4llm, chunking: page, dpi: 110}
  generation:
    generator: local_small_vlm          # <-- KAYA SWITCH (-> kaya_vlm)
    model_id: Qwen/Qwen2.5-VL-3B-Instruct   # <-- KAYA SWITCH (-> 7B/32B)
    max_new_tokens: 128
    temperature: 0.0
    reasoning: direct                   # pinned default; RQ3 varies this
    # cap vision tokens/page so the no-retrieval (first-N pages) condition fits
    # 12GB. ~602k px ≈ 150 tokens/page. On Kaya you can raise or remove this.
    max_pixels: 602112
  judge: {type: rule}

substudies:
  # ── Baselines: the RQ1 control (no-retrieval floor + oracle ceiling) and the
  #    universal floor/ceiling the whole analysis lives between (RQ spec §1). ──
  baselines:
    rq: RQ1
    role: control
    axes:
      retrieval.method:    [none, oracle]
      generation.modality: [image, text]

  # ── RQ1 — RETRIEVAL: similarity vs relation-aware (+ modality) [SPINE] ───────
  # Similarity signals: lexical (bm25/tfidf), dense (the control midpoint),
  # visual late-interaction (colpali/colqwen), and fusion. Control = floor+ceiling.
  RQ1_retrieval:
    rq: RQ1
    subset: evidence_source
    control: {kind: floor_ceiling}
    hypotheses:
      - id: H1a
        text: >-
          Visual late-interaction beats lexical on chart/figure/table evidence;
          lexical is competitive or better on pure-text, keyword-heavy evidence
          (an INTERACTION with evidence-source type, not a flat winner).
        subset: evidence_source
        expect: {key: retrieval.method, a: colpali, b: bm25, direction: a_gt_b}
      - id: H1c
        text: "Fusion >= the best single signal, with diminishing returns."
        expect: {key: retrieval.method, a: hybrid, b: dense, direction: a_ge_b}
    axes:
      retrieval.method:    [bm25, tfidf, dense, colpali, colqwen, hybrid]
      generation.modality: [image, text]
      retrieval.top_k:     [4]

  # RQ1 cross-cutting: top-k sweep on one sparse + one visual retriever.
  RQ1_topk:
    rq: RQ1
    note: "top-k is non-monotonic (attention dilution); produces acc/recall/cost curves."
    axes:
      retrieval.method:    [bm25, colpali]
      generation.modality: [image]
      retrieval.top_k:     [1, 2, 4, 8]

  # RQ1 relation-aware LEVEL (the survey's central split). The cheap end is
  # selection expansion (parent-section / adjacent); the rich end is structural
  # traversal (`traverse`: section/tree navigation). Targets H1b — wins on
  # multi-hop / cross-page, ~zero on single-page. Control = similarity (bm25).
  RQ1_relation_aware:
    rq: RQ1
    subset: question_type
    control: {kind: condition, key: retrieval.method, value: bm25}
    hypotheses:
      - id: H1b
        text: >-
          Relation-aware retrieval beats similarity-only SPECIFICALLY on
          multi-hop / cross-page questions; the gap is ~zero on single-page.
        subset: question_type
        expect: {key: retrieval.method, a: traverse, b: bm25,
                 where: {question_type: cross}, direction: a_gt_b}
      - id: H1b_null
        text: "...and ~zero gain on single-page questions (predicted near-null)."
        expect: {key: retrieval.method, a: traverse, b: bm25,
                 where: {question_type: single}, direction: "null"}
    axes:
      retrieval.method:    [bm25, traverse]
      retrieval.expand:    [none, adjacent, parent_section]
      generation.modality: [text]
      retrieval.top_k:     [2]

  # ── RQ2 — REPRESENTATION: extraction fidelity & structure [SPINE] ───────────
  # Text retrievers only (visual retrieval ignores the parser). Fix dense + text.
  # Fidelity axis: native-text (pymupdf4llm) vs layout-ML (mineru) vs OCR (tesseract).
  RQ2_representation:
    rq: RQ2
    subset: evidence_source
    control: {kind: reference}
    hypotheses:
      - id: H2a
        text: >-
          Accuracy is more sensitive to extraction fidelity on text-dense /
          table-heavy questions than on figure questions.
        subset: evidence_source
    axes:
      retrieval.method:      [dense]
      representation.parser: [pymupdf4llm, mineru, tesseract]
      generation.modality:   [text]
      retrieval.top_k:       [4]

  # RQ2 structure axis (the headline H2b): flat vs structure-aware chunking.
  RQ2_chunking:
    rq: RQ2
    subset: question_type
    control: {kind: condition, key: representation.chunking, value: page}
    hypotheses:
      - id: H2b
        text: >-
          Structure-aware (section) chunking beats flat chunking on cross-page
          questions (preserves parent/section context) but not single-page —
          adjudicating the RAG-DocVQA (no help) vs MultiDocFusion (helps) dispute.
        subset: question_type
        expect: {key: representation.chunking, a: section, b: chunk,
                 where: {question_type: cross}, direction: a_gt_b}
    axes:
      retrieval.method:        [dense]
      representation.chunking: [page, chunk, section]
      generation.modality:     [text]
      retrieval.top_k:         [4]

  # ── RQ3 — REASONING: sequential vs parallel [PRINCIPAL] ─────────────────────
  # Retrieval AND representation FIXED (reference dense/text), so the evidence
  # buffer is identical across reasoning conditions — any delta is reasoning
  # alone. Cost (calls/tokens) is the co-axis for the parallel methods.
  RQ3_reasoning:
    rq: RQ3
    subset: question_type
    control: {kind: condition, key: generation.reasoning, value: direct}
    hypotheses:
      - id: H3a
        text: "CoT helps on multi-hop (cross-page) questions but ~zero on single-hop lookup."
        subset: question_type
        expect: {key: generation.reasoning, a: cot, b: direct,
                 where: {question_type: cross}, direction: a_gt_b}
      - id: H3b
        text: "Self-consistency improves accuracy proportional to its sampling cost."
        expect: {key: generation.reasoning, a: self_consistency, b: cot, direction: a_ge_b}
      - id: H3c
        text: >-
          ToT gives little over CoT in MP-VRDU (the bottleneck is finding sparse
          evidence, not searching a reasoning tree) — a predicted NULL.
        expect: {key: generation.reasoning, a: tot, b: cot, direction: "null"}
    axes:
      retrieval.method:      [dense]
      generation.modality:   [text]
      generation.reasoning:  [direct, cot, self_reflection, self_consistency, tot]
      retrieval.top_k:       [4]

  # ── RQ4 — COARSE-TO-FINE / evidence narrowing [PRINCIPAL-IF-TIME] ────────────
  # single_pass (reference) vs retrieve->rerank->read (rerank: llm), at MATCHED
  # final budget (same top_k into the reader) so the contrast is narrowing-vs-not,
  # not more-compute. The `llm` arm needs a staged reranker model (rerank_model);
  # locally stage it like any other model or run it from configs/tier1/.
  RQ4_coarse_to_fine:
    rq: RQ4
    subset: doc_length
    control: {kind: condition, key: retrieval.rerank, value: none}
    hypotheses:
      - id: H4a
        text: >-
          Reranking improves page-F1 most when the first stage over-retrieves
          (high recall, low precision at large k); the gain shrinks at small k.
      - id: H4b
        text: "Coarse-to-fine's advantage over single-pass GROWS with document length."
        subset: doc_length
        expect: {key: retrieval.rerank, a: llm, b: none, direction: a_ge_b}
    axes:
      retrieval.method:       [dense]
      retrieval.rerank:       [none, llm]
      retrieval.rerank_candidates: [8]
      generation.modality:    [text]
      retrieval.top_k:        [4]

  # ── CROSS-CUTTING — generation modality (swept within RQs, not a principal RQ;
  #    RQ spec §3). Fixed retrieval (ColPali) + representation; flip image/text/both.
  crosscutting_modality:
    rq: crosscutting
    axes:
      retrieval.method:    [colpali]
      generation.modality: [image, text, both]
      retrieval.top_k:     [4]
