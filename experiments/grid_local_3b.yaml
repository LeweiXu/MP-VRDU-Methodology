# Full experiment grid, configured for LOCAL testing with the tiny 3B VLM.
#
# ╔══════════════════════════════════════════════════════════════════════════╗
# ║ THE KAYA SWITCH: to run this exact grid on Kaya with the real 7B/32B,      ║
# ║ change ONLY the `defaults.generation` block below:                         ║
# ║     generator: kaya_vlm                                                     ║
# ║     model_id:  Qwen/Qwen2.5-VL-7B-Instruct   # or -32B                      ║
# ║ Everything else (retrievers, parsers, modalities, top-k) is identical.     ║
# ╚══════════════════════════════════════════════════════════════════════════╝
#
# Run:   python scripts/run_grid.py --suite experiments/grid_local_3b.yaml
# Each axes-combination below becomes one pipeline run (one JSONL file).

defaults:
  seed: 0
  data: {name: mmlongbench-doc, slice: full}
  representation: {parser: pymupdf4llm, chunking: page, dpi: 110}
  generation:
    generator: local_small_vlm          # <-- KAYA SWITCH (-> kaya_vlm)
    model_id: Qwen/Qwen2.5-VL-3B-Instruct   # <-- KAYA SWITCH (-> 7B/32B)
    max_new_tokens: 128
    temperature: 0.0
    # cap vision tokens/page so the no-retrieval (first-N pages) condition fits
    # 12GB. ~602k px ≈ 150 tokens/page. On Kaya you can raise or remove this.
    max_pixels: 602112
  judge: {type: rule}

substudies:
  # Floor + ceiling. The analysis lives between these (context.md §7).
  baselines:
    axes:
      retrieval.method:    [none, oracle]
      generation.modality: [image, text]

  # Sub-study A: retrieval method, two generation blocks (image / text), k=4.
  A_retrieval:
    axes:
      retrieval.method:    [bm25, tfidf, dense, colpali, colqwen, hybrid]
      generation.modality: [image, text]
      retrieval.top_k:     [4]

  # Sub-study A cross-cutting: top-k sweep on one sparse + one visual retriever.
  A_topk:
    axes:
      retrieval.method:    [bm25, colpali]
      generation.modality: [image]
      retrieval.top_k:     [1, 2, 4, 8]

  # Sub-study B: document representation (text retrievers only). Fix dense; vary
  # the parser. mineru/tesseract are optional heavy backends (see README).
  B_representation:
    axes:
      retrieval.method:     [dense]
      representation.parser: [pymupdf4llm, mineru, tesseract]
      generation.modality:  [text]
      retrieval.top_k:      [4]

  # Sub-study C: generation modality, fixed retrieval (ColPali) + representation.
  C_modality:
    axes:
      retrieval.method:    [colpali]
      generation.modality: [image, text, both]
      retrieval.top_k:     [4]

  # ---- Tier-1 corpus techniques (docs/corpus_techniques.md) ----
  # All model-free (no extra checkpoint); rerank (#3) needs a staged LLM so it's
  # run separately (configs/tier1/rerank_llm.yaml), not in the local grid.

  # D: adaptive top-k (#1). fixed vs GMM vs k-means cut, retriever held constant.
  # candidate_k bounds the pool the adaptive cut chooses from, so image modality
  # never feeds more pages than the fixed top_k=8 run (>~10 page-images OOMs 12GB).
  D_adaptive_k:
    axes:
      retrieval.method:     [bm25, colpali]
      retrieval.k_strategy: [fixed, gmm, kmeans]
      retrieval.candidate_k: [8]
      generation.modality:  [image]
      retrieval.top_k:      [8]

  # E: selection expansion (#4/#5). none vs adjacent vs parent-section.
  E_expand:
    axes:
      retrieval.method:    [bm25]
      retrieval.expand:    [none, adjacent, parent_section]
      generation.modality: [image]
      retrieval.top_k:     [2]

  # F: flat vs structure-aware chunking (#2). Text retriever; vary granularity.
  F_chunking:
    axes:
      retrieval.method:       [dense]
      representation.chunking: [page, chunk, section]
      generation.modality:    [text]
      retrieval.top_k:        [4]
