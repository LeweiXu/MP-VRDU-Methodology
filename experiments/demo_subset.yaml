# Small local demonstration of the RQ studies (docs/research_questions.md), at
# subset scale. A few runs per RQ exercise the mechanism framing end-to-end:
#   RQ1 (retrieval): which signal selects better evidence pages?
#   RQ2 (representation): does extraction fidelity / structure change the answer?
#   crosscutting (modality): images, text, or both into the reader?
#
# The first subset questions include cross-page, single-page, and unanswerable
# examples (so the per-subset breakdowns are non-empty).
#
# Preview: python scripts/run_grid.py --suite experiments/demo_subset.yaml \
#              --results-root results/demo --dry-run
# Run:     python scripts/run_grid.py --suite experiments/demo_subset.yaml \
#              --results-root results/demo --isolate
# Report:  python scripts/report.py --results results/demo
defaults:
  seed: 0
  data:
    name: mmlongbench-doc
    slice: data/mmlongbench_subset
    max_questions: 10
  representation: {parser: pymupdf4llm, chunking: page, dpi: 110}
  generation:
    generator: local_small_vlm
    model_id: Qwen/Qwen2.5-VL-3B-Instruct
    max_new_tokens: 64
    temperature: 0.0
    max_pixels: 401408
  judge: {type: rule}

substudies:
  baselines:
    axes:
      retrieval.method:    [none, oracle]
      generation.modality: [image, text]

  # RQ1: retrieval method (similarity signals), two generation blocks, k=4.
  RQ1_retrieval:
    rq: RQ1
    subset: evidence_source
    control: {kind: floor_ceiling}
    axes:
      retrieval.method:    [bm25, tfidf, dense, colpali, colqwen, hybrid]
      generation.modality: [image, text]
      retrieval.top_k:     [4]

  # RQ2: document representation (text retrievers only). Fix dense; vary parser.
  # mineru/tesseract are optional heavy backends (see README).
  RQ2_representation:
    rq: RQ2
    subset: evidence_source
    control: {kind: reference}
    axes:
      retrieval.method:     [dense]
      representation.parser: [pymupdf4llm, mineru, tesseract]
      generation.modality:  [text]
      retrieval.top_k:      [4]

  # Cross-cutting: generation modality, fixed retrieval (ColPali) + representation.
  crosscutting_modality:
    rq: crosscutting
    axes:
      retrieval.method:    [colpali]
      generation.modality: [image, text, both]
      retrieval.top_k:     [4]