# Full experiment grid for KAYA with the real Qwen2.5-VL-7B (Apache-2.0), RQ-framed.
# docs/research_questions.md is the GOVERNING spec; each study traces to an RQ
# with directional, per-subset hypotheses against a declared control.
#
#   sbatch scripts/kaya/run_grid.sbatch                # uses this suite's generator
#   # or the 32B scaling point (robustness check — do mechanism rankings hold?):
#   python scripts/run_grid.py --suite experiments/grid_kaya_7b.yaml \
#       --generator kaya_vlm --model-id Qwen/Qwen2.5-VL-32B-Instruct
#
# RESUMABLE: split across SLURM array jobs / sessions freely.
#
# ┌────────────────────────────────────────────────────────────────────────────┐
# │ JUDGE: this runs the deterministic rule judge. For the HEADLINE numbers,     │
# │ rerun the key conditions with a FIXED LLM judge and declare it (the          │
# │ reference pipeline / configs/reference.yaml uses the llm judge).             │
# └────────────────────────────────────────────────────────────────────────────┘

defaults:
  seed: 0
  data: {name: mmlongbench-doc, slice: full}
  representation: {parser: pymupdf4llm, chunking: page, dpi: 150}
  generation:
    generator: kaya_vlm
    model_id: Qwen/Qwen2.5-VL-7B-Instruct
    max_new_tokens: 256
    temperature: 0.0
    reasoning: direct                   # pinned default; RQ3 varies this
    max_pixels: 1003520        # ~1280*28*28; A100 has headroom (raise/remove if OK)
  judge: {type: rule}

substudies:
  # ── Baselines: RQ1 control (no-retrieval floor + oracle ceiling) ────────────
  baselines:
    rq: RQ1
    role: control
    axes:
      retrieval.method:    [none, oracle]
      generation.modality: [image, text]

  # ── RQ1 — RETRIEVAL: similarity vs relation-aware (+ modality) [SPINE] ───────
  RQ1_retrieval:
    rq: RQ1
    subset: evidence_source
    control: {kind: floor_ceiling}
    hypotheses:
      - id: H1a
        text: >-
          Visual late-interaction beats lexical on chart/figure/table evidence;
          lexical competitive/better on pure-text, keyword-heavy evidence.
        subset: evidence_source
        expect: {key: retrieval.method, a: colpali, b: bm25, direction: a_gt_b}
      - id: H1c
        text: "Fusion >= the best single signal, with diminishing returns."
        expect: {key: retrieval.method, a: hybrid, b: dense, direction: a_ge_b}
    axes:
      retrieval.method:    [bm25, tfidf, dense, colpali, colqwen, hybrid]
      generation.modality: [image, text]
      retrieval.top_k:     [1, 2, 4, 8]

  # RQ1 relation-aware LEVEL: expansion (cheap) + structural traversal (rich).
  RQ1_relation_aware:
    rq: RQ1
    subset: question_type
    control: {kind: condition, key: retrieval.method, value: bm25}
    hypotheses:
      - id: H1b
        text: >-
          Relation-aware retrieval beats similarity-only on multi-hop / cross-page
          questions; the gap is ~zero on single-page.
        subset: question_type
        expect: {key: retrieval.method, a: traverse, b: bm25,
                 where: {question_type: cross}, direction: a_gt_b}
      - id: H1b_null
        text: "...and ~zero gain on single-page questions (predicted near-null)."
        expect: {key: retrieval.method, a: traverse, b: bm25,
                 where: {question_type: single}, direction: "null"}
    axes:
      retrieval.method:    [bm25, traverse]
      retrieval.expand:    [none, adjacent, parent_section]
      generation.modality: [text]
      retrieval.top_k:     [2]

  # ── RQ2 — REPRESENTATION: fidelity & structure [SPINE] ──────────────────────
  RQ2_representation:
    rq: RQ2
    subset: evidence_source
    control: {kind: reference}
    hypotheses:
      - id: H2a
        text: >-
          Accuracy is more sensitive to extraction fidelity on text-dense /
          table-heavy questions than on figure questions.
        subset: evidence_source
    axes:
      retrieval.method:      [dense]
      representation.parser: [pymupdf4llm, mineru, tesseract]
      generation.modality:   [text]
      retrieval.top_k:       [4]

  RQ2_chunking:
    rq: RQ2
    subset: question_type
    control: {kind: condition, key: representation.chunking, value: page}
    hypotheses:
      - id: H2b
        text: >-
          Structure-aware (section) chunking beats flat chunking on cross-page
          questions but not single-page (adjudicates the live dispute).
        subset: question_type
        expect: {key: representation.chunking, a: section, b: chunk,
                 where: {question_type: cross}, direction: a_gt_b}
    axes:
      retrieval.method:        [dense]
      representation.chunking: [page, chunk, section]
      generation.modality:     [text]
      retrieval.top_k:         [4]

  # ── RQ3 — REASONING: sequential vs parallel [PRINCIPAL] ─────────────────────
  # Retrieval + representation FIXED -> identical evidence buffer; delta is reasoning.
  RQ3_reasoning:
    rq: RQ3
    subset: question_type
    control: {kind: condition, key: generation.reasoning, value: direct}
    hypotheses:
      - id: H3a
        text: "CoT helps on multi-hop (cross-page) but ~zero on single-hop lookup."
        subset: question_type
        expect: {key: generation.reasoning, a: cot, b: direct,
                 where: {question_type: cross}, direction: a_gt_b}
      - id: H3b
        text: "Self-consistency improves accuracy proportional to sampling cost."
        expect: {key: generation.reasoning, a: self_consistency, b: cot, direction: a_ge_b}
      - id: H3c
        text: "ToT gives little over CoT in MP-VRDU — a predicted NULL."
        expect: {key: generation.reasoning, a: tot, b: cot, direction: "null"}
    axes:
      retrieval.method:      [dense]
      generation.modality:   [text]
      generation.reasoning:  [direct, cot, self_reflection, self_consistency, tot]
      retrieval.top_k:       [4]

  # ── RQ4 — COARSE-TO-FINE [PRINCIPAL-IF-TIME] ────────────────────────────────
  # single_pass vs retrieve->rerank->read at MATCHED final budget (same top_k).
  RQ4_coarse_to_fine:
    rq: RQ4
    subset: doc_length
    control: {kind: condition, key: retrieval.rerank, value: none}
    hypotheses:
      - id: H4a
        text: >-
          Reranking improves page-F1 most when the first stage over-retrieves
          (high recall, low precision at large k); the gain shrinks at small k.
        expect: {key: retrieval.rerank, a: llm, b: none, direction: a_ge_b}
      - id: H4b
        text: "Coarse-to-fine's advantage over single-pass GROWS with document length."
        subset: doc_length
    axes:
      retrieval.method:       [dense]
      retrieval.rerank:       [none, llm]
      retrieval.rerank_candidates: [8]
      retrieval.rerank_model: [Qwen/Qwen2.5-7B-Instruct]
      generation.modality:    [text]
      retrieval.top_k:        [2, 4]

  # ── CROSS-CUTTING — generation modality (RQ spec §3) ────────────────────────
  crosscutting_modality:
    rq: crosscutting
    axes:
      retrieval.method:    [colqwen, bm25]
      generation.modality: [image, text, both]
      retrieval.top_k:     [4]
